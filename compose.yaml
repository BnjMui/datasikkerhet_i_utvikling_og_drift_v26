name: db_datasikkerhet

services:
  web:
    container_name: datasikkerhet_web
    image: datasikkerhet/web
    build:
      dockerfile: ./docker/web.Dockerfile
    volumes:
      - ./www:/var/www
      - ./server_config/usr/local/etc/php:/usr/local/etc/php/
      - ./server_config/etc/apache2:/etc/apache2
    ports:
      - 8080:80
  db:
    container_name: datasikkerhet_db
    image: datasikkerhet/db
    build: 
      dockerfile: ./docker/db.Dockerfile
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dev
    volumes:
      - datasikkerhet_db:/var/lib/mysql

  my-admin:
    container_name: datasikkerhet_phpmyadmin
    image: phpmyadmin/phpmyadmin
    ports:
      - 8081:80
    environment:
      MYSQL_USERNAME: root
      MYSQL_ROOT_PASSWORD: dev
      

volumes:
  datasikkerhet_db:
